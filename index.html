<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#15433A">
<title>Azad Guest House</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Azad%20Guest%20House%22%2C%22short_name%22%3A%22Azad%20GH%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F6F1E4%22%2C%22theme_color%22%3A%22%2315433A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D%2522http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%2522%2520viewBox%3D%25220%25200%2520100%2520100%2522%253E%253Crect%2520width%3D%2522100%2522%2520height%3D%2522100%2522%2520fill%3D%2522%252315433A%2522%2F%253E%253Ctext%2520x%3D%252250%2522%2520y%3D%252266%2522%2520font-size%3D%252256%2522%2520fill%3D%2522%2523C9A24B%2522%2520text-anchor%3D%2522middle%2522%2520font-family%3D%2522Georgia%2522%253EA%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<style>
  :root{
    --jade:#15433A; --jadeLite:#1F5E50; --gold:#C9A24B; --goldSoft:#E8D9A8;
    --ivory:#F6F1E4; --henna:#9C3B2E; --ink:#1A1714; --mute:#6E665A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:var(--ivory);color:var(--ink);}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--ivory);position:relative;padding-bottom:88px;}
  .hdr{background:var(--jade);padding:18px 20px 22px;border-radius:0 0 24px 24px;position:relative;overflow:hidden;}
  .hdr .arch{position:absolute;right:-20px;top:-20px;opacity:.18;pointer-events:none;}
  #gearBtn{position:relative;z-index:5;}
  #gearBtn svg{pointer-events:none;}
  .brand-sm{color:var(--goldSoft);font-size:11px;letter-spacing:3px;text-transform:uppercase;}
  .brand-lg{color:var(--ivory);font-size:21px;font-weight:600;margin-top:2px;}
  .brand-loc{color:var(--goldSoft);font-size:12px;opacity:.8;margin-top:2px;}
  .wrap{padding:16px 18px;}
  .sect{display:flex;align-items:center;gap:8px;margin:20px 0 12px;}
  .sect .l{width:14px;height:1px;background:var(--gold);}
  .sect span{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mute);white-space:nowrap;}
  .sect .r{flex:1;height:1px;background:var(--goldSoft);}
  .card{background:#fff;border-radius:16px;padding:15px;border:1px solid var(--goldSoft);margin-bottom:10px;}
  .row{display:flex;justify-content:space-between;align-items:center;}
  .stat-row{display:flex;gap:10px;}
  .stat{flex:1;text-align:center;}
  .card.stat[data-goto]{cursor:pointer;transition:transform .08s;}
  .card.stat[data-goto]:active{transform:scale(0.97);}
  .stat .n{font-size:24px;font-weight:700;}
  .stat .lbl{font-size:11px;color:var(--mute);}
  .dot{width:9px;height:9px;border-radius:99px;display:inline-block;}
  .chip{font-size:10px;padding:3px 8px;border-radius:99px;display:inline-block;}
  .bar{height:6px;background:var(--ivory);border-radius:99px;overflow:hidden;margin-top:10px;}
  .bar>div{height:100%;}
  .muted{color:var(--mute);font-size:12px;}
  .btn{border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;width:100%;}
  .btn-gold{background:var(--gold);color:var(--jade);}
  .btn-jade{background:var(--jade);color:var(--ivory);}
  .btn-ghost{background:#fff;color:var(--jade);border:1px solid var(--goldSoft);}
  .fab{position:fixed;bottom:100px;right:calc(50% - 240px + 18px);background:var(--gold);border:none;width:56px;height:56px;border-radius:18px;box-shadow:0 6px 18px rgba(201,162,75,.45);cursor:pointer;font-size:30px;color:var(--jade);line-height:1;display:flex;align-items:center;justify-content:center;z-index:30;}
  @media(max-width:480px){.fab{right:18px;}}
  .nav{position:fixed;bottom:0;width:100%;max-width:480px;background:#fff;border-top:1px solid var(--goldSoft);display:flex;padding:9px 0 13px;z-index:25;}
  .nav button{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;color:var(--mute);font-size:10px;}
  .nav button.active{color:var(--jade);font-weight:700;}
  .nav svg{width:21px;height:21px;}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,18,15,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--ivory);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 20px 28px;max-height:92vh;overflow-y:auto;animation:up .22s ease;}
  @keyframes up{from{transform:translateY(40px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .modal h3{margin:0 0 4px;color:var(--jade);font-size:20px;}
  label{display:block;font-size:12px;color:var(--mute);margin:12px 0 5px;letter-spacing:.5px;}
  input,select,textarea{width:100%;padding:11px;border:1px solid var(--goldSoft);border-radius:10px;font-family:inherit;font-size:15px;background:#fff;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg{display:flex;gap:8px;margin-top:5px;}
  .seg button{flex:1;padding:10px;border:1px solid var(--goldSoft);background:#fff;border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--mute);}
  .seg button.on{background:var(--jade);color:var(--ivory);border-color:var(--jade);}
  .x{background:none;border:none;font-size:24px;color:var(--mute);cursor:pointer;line-height:1;}
  .empty{text-align:center;color:var(--mute);font-size:13px;padding:30px 10px;}
  .pmt-line{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--ivory);}
  .del{color:var(--henna);font-size:12px;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;}
  .toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--jade);color:var(--ivory);padding:11px 18px;border-radius:12px;font-size:13px;z-index:99;opacity:0;transition:opacity .3s;}
  .toast.show{opacity:1;}
  .iconbtn{background:none;border:none;cursor:pointer;color:var(--jadeLite);font-family:inherit;font-size:13px;}
  .install-banner{background:var(--goldSoft);color:var(--ink);padding:10px 14px;border-radius:12px;font-size:13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .nav button span{font-size:9.5px;}
  /* calendar */
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .cal-head button{background:#fff;border:1px solid var(--goldSoft);border-radius:10px;width:38px;height:38px;font-size:18px;color:var(--jade);cursor:pointer;font-family:inherit;}
  .cal-title{font-size:17px;font-weight:600;color:var(--jade);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{text-align:center;font-size:10px;color:var(--mute);padding:4px 0;letter-spacing:.5px;}
  .cal-cell{aspect-ratio:1;border-radius:10px;border:1px solid var(--goldSoft);background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;font-size:13px;cursor:pointer;position:relative;}
  .cal-cell.empty{border:none;background:transparent;cursor:default;}
  .cal-cell.today{border-color:var(--gold);border-width:2px;font-weight:700;}
  .cal-cell.has{background:var(--jade);color:var(--ivory);border-color:var(--jade);}
  .cal-cell.clash{background:var(--henna);color:#fff;border-color:var(--henna);}
  .cal-cell .pip{position:absolute;bottom:5px;display:flex;gap:2px;}
  .cal-cell .pip i{width:4px;height:4px;border-radius:99px;background:var(--gold);display:block;}
  .cal-cell.has .pip i,.cal-cell.clash .pip i{background:var(--goldSoft);}
  .cal-cell.muh{border-color:var(--gold);background:#FBF6E7;}
  .cal-cell .star{position:absolute;top:3px;right:4px;font-size:9px;color:var(--gold);}
  .cal-cell.has .star,.cal-cell.clash .star{color:var(--goldSoft);}
  /* rooms */
  .room-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .room{background:#fff;border:1px solid var(--goldSoft);border-radius:14px;padding:13px;cursor:pointer;position:relative;}
  .room.occ{background:var(--jade);border-color:var(--jade);color:var(--ivory);}
  .room .rn{font-weight:600;font-size:15px;}
  .room .rt{font-size:11px;color:var(--mute);margin-top:1px;}
  .room.occ .rt{color:var(--goldSoft);}
  .room .who{font-size:12px;margin-top:8px;line-height:1.4;}
  .room .vac{font-size:12px;margin-top:8px;color:var(--jadeLite);font-weight:600;}
  .room .tag{position:absolute;top:11px;right:11px;width:8px;height:8px;border-radius:99px;}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:14px;font-size:11px;color:var(--mute);}
  .legend span{display:flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:3px;display:block;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <svg class="arch" width="120" height="120" viewBox="0 0 100 100">
      <path d="M50 5 A45 45 0 0 1 95 50 L50 50 Z" fill="none" stroke="#C9A24B" stroke-width="1" stroke-dasharray="2 3"/>
      <path d="M50 15 A35 35 0 0 1 85 50 L50 50 Z" fill="none" stroke="#C9A24B" stroke-width="1" stroke-dasharray="2 3"/>
      <circle cx="50" cy="50" r="3" fill="#C9A24B"/>
    </svg>
    <div class="row">
      <div>
        <div class="brand-sm">Mehfil Manager</div>
        <div class="brand-lg">Azad Guest House</div>
        <div class="brand-loc">Banthra, Lucknow</div>
      </div>
      <button id="gearBtn" style="background:none;border:none;cursor:pointer;padding:4px;align-self:flex-start;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8D9A8" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="wrap" id="view"></div>
</div>

<button class="fab" id="fab">+</button>

<div class="nav">
  <button data-tab="home" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>Today</button>
  <button data-tab="bookings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Bookings</button>
  <button data-tab="calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Calendar</button>
  <button data-tab="billing">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12M6 8h12M9 13c6 0 6 8 0 8M6 13h3M14 21l-8-8"/></svg>Billing</button>
  <button data-tab="vendors">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Vendors</button>
  <button data-tab="rooms">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 12V7a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v5M3 12v6m18-6v6M6 9h4"/></svg>Rooms</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────── IndexedDB (persists on device) ─────────── */
const DB_NAME="azad_gh", STORES=["bookings","vendors","tasks","rooms"];
let db;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB_NAME,2);
  r.onupgradeneeded=e=>{const d=e.target.result;STORES.forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});};
  r.onsuccess=e=>{db=e.target.result;res();};
  r.onerror=e=>rej(e);
});}
function tx(store,mode="readonly"){return db.transaction(store,mode).objectStore(store);}
function getAll(store){return new Promise(res=>{const out=[];tx(store).openCursor().onsuccess=e=>{const c=e.target.result;if(c){out.push(c.value);c.continue();}else res(out);};});}
function put(store,val){return new Promise(res=>{tx(store,"readwrite").put(val).onsuccess=()=>res();});}
function del(store,id){return new Promise(res=>{tx(store,"readwrite").delete(id).onsuccess=()=>res();});}
function clearStore(store){return new Promise(res=>{tx(store,"readwrite").clear().onsuccess=()=>res();});}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const inr=n=>"₹"+Number(n||0).toLocaleString("en-IN");
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}

/* ─────────── State ─────────── */
let S={bookings:[],vendors:[],tasks:[],rooms:[]}, tab="home";

async function refresh(){
  S.bookings=await getAll("bookings");
  S.vendors=await getAll("vendors");
  S.tasks=await getAll("tasks");
  S.rooms=await getAll("rooms");
  if(!S.rooms.length&&!localStorageSeeded()){
    // seed a starter set of rooms on very first run
    const seed=[{n:"Room 1",t:"AC Double"},{n:"Room 2",t:"AC Double"},{n:"Room 3",t:"AC Double"},{n:"Room 4",t:"Non-AC Double"},{n:"Room 5",t:"Non-AC Double"},{n:"Suite 1",t:"Family Suite"}];
    for(const s of seed)await put("rooms",{id:uid(),name:s.n,type:s.t,occupant:"",side:"",until:""});
    markSeeded();
    S.rooms=await getAll("rooms");
  }
  S.bookings.sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  S.rooms.sort((a,b)=>(a.name||"").localeCompare(b.name||"",undefined,{numeric:true}));
  render();
}
function localStorageSeeded(){try{return localStorage.getItem("azad_seeded")==="1";}catch(e){return false;}}
function markSeeded(){try{localStorage.setItem("azad_seeded","1");}catch(e){}}

/* ─────────── Helpers ─────────── */
function balance(b){return (Number(b.total)||0)-(b.payments||[]).reduce((s,p)=>s+Number(p.amt||0),0);}
function paid(b){return (b.payments||[]).reduce((s,p)=>s+Number(p.amt||0),0);}
function fmtDate(d){if(!d)return"";const dt=new Date(d+"T00:00");return dt.toLocaleDateString("en-IN",{day:"numeric",month:"short"});}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ─────────── Packages ─────────── */
/* ─────────── Packages (from Azad Guest House rate sheet, Hindi) ───────────
   Each item: [विवरण, मात्रा]. Notes & terms in Hindi shown on quote. */
const PKG_NOTE="नोट: यदि डीजल का मूल्य बाज़ार दर से अधिक होता है तो उसका बढ़ा हुआ मूल्य पार्टी को स्वयं देना होगा।";
const PKG_TERMS=[
  "डीजल अलग से देना होगा जो कि शाम 7:00 P.M. पर चलेगा।",
  "एडवांस के पश्चात् शेष राशि का भुगतान कार्यक्रम से एक सप्ताह पूर्व जमा कराना अनिवार्य है।",
  "पानी का स्टाल गेट के बाहर रहेगा।",
  "कमरों के लिये ताला-चाबी स्वयं लेकर आएं।",
  "अपने वाहनों की सुरक्षा स्वयं करें।",
  "परिसर में अस्त्र-शस्त्र लाना वर्जित है। (आज्ञा से — पुलिस अधिक्षक, लखनऊ)",
  "शासन द्वारा जारी दिशा-निर्देश का पालन करें।",
  "वरमाला, मिलनी माला स्वयं लेकर आयें।"
];
const STAGE_NOTE="यदि स्टेज दुबारा बनवानी पड़े तो उसका खर्च अलग से देना होगा";
// item label list (order fixed); each package gives quantity per item
const PKG_ITEMS=["कमरे","हॉल","लॉन","गेट","स्टेज","मण्डप","कुर्सी वेलवेट","सोफा सेट (ग्राउण्ड हॉल में)","कुर्सी पी.वी.सी.","गोलमेज़","मेज़","लाइटिंग डेकोरेशन","जनरेटर 83 के.वी.ए.","किचन","ड्रम","दरी","स्टाल","अतिरिक्त बिस्तर सेट","मैटिंग","नेम प्लेट","डी.जे."];
function bi(arr){ // build items array pairing labels with quantities
  return PKG_ITEMS.map((label,i)=>({label,qty:arr[i]})).filter(x=>x.qty!=="0"&&x.qty!==0);
}
const PACKAGES={
  none:{label:"कस्टम (बिना पैकेज)",total:0,items:[]},
  gold:{label:"Gold पैकेज",total:165000,items:bi([
    "11 (AC)","2 (AC) + 2 हॉल (नॉन-AC)","1","1","1 ("+STAGE_NOTE+")","1","125","फुल","160","6","100","फुल","1 (बिना डीजल)","1","5","4","20 (फुल)","60","केवल प्रवेश द्वार पर (फुल नहीं)","1","1"])},
  star:{label:"Star पैकेज",total:145000,items:bi([
    "6 (AC)","2 (AC) + 1 हॉल (नॉन-AC)","1","1","1 ("+STAGE_NOTE+")","1","125","फुल","160","6","100","फुल","1 (बिना डीजल)","1","5","4","20 (फुल)","60","केवल प्रवेश द्वार पर (फुल नहीं)","1","1"])},
  silver:{label:"Silver पैकेज",total:125000,items:bi([
    "2 (AC)","1 (AC)","1","1","1 ("+STAGE_NOTE+")","0","125","फुल","160","6","100","फुल","1 (बिना डीजल)","1","5","4","20 (फुल)","60","केवल प्रवेश द्वार पर (फुल नहीं)","1","1"])},
  bronze:{label:"Bronze पैकेज",total:75000,items:bi([
    "2 (AC)","1 (AC) + 1 हॉल (नॉन-AC)","0","1","1 ("+STAGE_NOTE+")","0","50","फुल","0","0","25","0","1 (बिना डीजल)","1","5","4","0","0","केवल प्रवेश द्वार पर (फुल नहीं)","0","1"])}
};
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();

/* ─────────── Auspicious wedding dates (vivah muhurat) ───────────
   Indicative shubh vivah dates. ALWAYS verify with a current panchang/qazi —
   these are planning aids, not religious rulings. Editable by the user too. */
const MUHURAT_DEFAULT={

function muhuratSet(){
  // user can extend via stored custom dates (key: muhurat_custom)
  let custom=[];try{custom=JSON.parse(localStorage.getItem("muhurat_custom")||"[]");}catch(e){}

function vBookings(){
  if(!S.bookings.length) return `<div class="empty">अभी कोई एंट्री नहीं।<br>+ दबाकर नई query या बुकिंग जोड़ें।</div>`;
  const queries=S.bookings.filter(b=>b.status==="query");
  const finals=S.bookings.filter(b=>b.status!=="query");
  function finalCard(b){
    const bal=balance(b), pct=b.total>0?Math.min(100,paid(b)/b.total*100):0;
    const pkg=PACKAGES[b.pkg];
    return `<div class="card" data-open="booking" data-id="${b.id}">
      <div class="row">
        <div><b style="font-size:15px">${esc(b.family)}</b>
          <div class="muted" style="margin-top:3px">${esc(b.fn)} · ${fmtDate(b.date)}${b.hall?' · '+esc(b.hall):''}</div>
          ${pkg&&b.pkg!=="none"?`<div class="muted" style="font-size:11px;margin-top:2px">${esc(pkg.label)}</div>`:''}</div>
        <span class="chip" style="background:${b.side==='bride'?'var(--goldSoft)':'var(--jade)'};color:${b.side==='bride'?'var(--ink)':'var(--ivory)'}">${b.side==='bride'?'वधू':'वर'}</span>
      </div>
      <div class="bar"><div style="width:${pct}%;background:${bal<=0?'var(--jadeLite)':'var(--gold)'}"></div></div>
      <div class="row" style="margin-top:6px">
        <span class="muted">प्राप्त ${inr(paid(b))} / ${inr(b.total)}</span>
        <span style="font-size:12px;font-weight:600;color:${bal<=0?'var(--jadeLite)':'var(--henna)'}">${bal<=0?'पूर्ण भुगतान':'शेष '+inr(bal)}</span>
      </div>
    </div>`;
  }
  function queryCard(b){
    const n=Object.keys(b.quotePkgs||{}).filter(k=>b.quotePkgs[k]&&b.quotePkgs[k].on).length;
    return `<div class="card" data-open="booking" data-id="${b.id}">
      <div class="row">
        <div><b style="font-size:15px">${esc(b.family)}</b>
          <div class="muted" style="margin-top:3px">${esc(b.fn)}${b.date?' · '+fmtDate(b.date):''}${b.hall?' · '+esc(b.hall):''}</div></div>
        <span class="chip" style="background:#E8D9A8;color:#1A1714">Query</span>
      </div>
      <div class="muted" style="margin-top:8px;font-size:12px">${n?n+' पैकेज कोटेशन हेतु चुने':'पैकेज चुनना बाकी'} · टैप करके कोटेशन भेजें</div>
    </div>`;
  }
  let html="";
  if(queries.length){
    html+=`<div class="sect"><span class="l"></span><span>Queries / पूछताछ (${queries.length})</span><span class="r"></span></div>`;
    html+=queries.map(queryCard).join("");
  }
  if(finals.length){
    html+=`<div class="sect"><span class="l"></span><span>Final Bookings (${finals.length})</span><span class="r"></span></div>`;
    html+=finals.map(finalCard).join("");
  }
  return html;
}

function vCalendar(){
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  // map date -> bookings
  const byDate={};
  S.bookings.forEach(b=>{if(b.date){(byDate[b.date]=byDate[b.date]||[]).push(b);}});
  const muh=muhuratSet();
  let cells="";
  for(let i=0;i<first;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const evs=byDate[ds]||[];
    const isToday=ds===todayStr();
    const isMuh=muh.has(ds);
    let cls="cal-cell";
    if(isToday)cls+=" today";
    if(evs.length>1)cls+=" clash";       // same-date = potential clash
    else if(evs.length===1)cls+=" has";
    else if(isMuh)cls+=" muh";           // auspicious & free
    const star=isMuh?`<span class="star">✦</span>`:"";
    const pips=evs.length?`<div class="pip">${evs.slice(0,3).map(()=>"<i></i>").join("")}</div>`:"";
    const tappable=evs.length||isMuh;
    cells+=`<div class="${cls}" ${tappable?`data-calday="${ds}"`:""}>${star}${d}${pips}</div>`;
  }
  const clashes=Object.entries(byDate).filter(([d,e])=>e.length>1&&d>=todayStr()).length;
  return `
    <div class="cal-head">
      <button id="calPrev">‹</button>
      <div class="cal-title">${monthNames[calMonth]} ${calYear}</div>
      <button id="calNext">›</button>
    </div>
    ${clashes?`<div class="install-banner" style="background:#F3D9D4;color:var(--henna)">⚠ ${clashes} date${clashes>1?'s have':' has'} more than one function booked</div>`:''}
    <div class="cal-grid">
      ${["S","M","T","W","T","F","S"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
      ${cells}
    </div>
    <div class="legend">
      <span><i style="background:var(--jade)"></i>Booked</span>
      <span><i style="background:var(--henna)"></i>Clash</span>
      <span><i style="background:#fff;border:2px solid var(--gold)"></i>Today</span>
      <span><span style="color:var(--gold);font-size:13px">✦</span>Shubh</span>
    </div>
    <div class="muted" style="text-align:center;margin-top:10px;font-size:11px;line-height:1.5">✦ marks indicative auspicious wedding dates.<br>Always confirm with a current panchang or qazi.</div>`;
}

    <label>Side</label>

      <button type="button" data-rside="" class="${!r.side?'on':''}">—</button>
      <button type="button" data-rside="groom" class="${r.side==='groom'?'on':''}">Groom</button>
      <button type="button" data-rside="bride" class="${r.side==='bride'?'on':''}">Bride</button>
    </div>
    <label>Check-out date</label><input id="r_until" type="date" value="${r.until||''}">
    <button class="btn btn-gold" id="saveRoom" style="margin-top:18px">Save</button>
    ${occupied?`<button class="btn btn-jade" id="checkout" style="margin-top:10px">Check out (mark vacant)</button>`:''}
    <button class="btn" id="delRoom" style="margin-top:10px;background:#fff;color:var(--henna);border:1px solid var(--henna)">Remove room</button>
  `);
  let rside=r.side||"";
  bg.querySelectorAll("[data-rside]").forEach(btn=>btn.onclick=()=>{rside=btn.dataset.rside;bg.querySelectorAll("[data-rside]").forEach(x=>x.classList.toggle("on",x===btn));});
  bg.querySelector("[data-close]").onclick=()=>bg.remove();
  bg.querySelector("#saveRoom").onclick=async()=>{
    await put("rooms",{...r,name:val("r_name")||r.name,type:val("r_type"),occupant:val("r_occ"),side:rside,until:val("r_until")});
    bg.remove();await refresh();toast("Room updated");
  };
  if(occupied)bg.querySelector("#checkout").onclick=async()=>{
    await put("rooms",{...r,occupant:"",side:"",until:""});bg.remove();await refresh();toast(r.name+" is now vacant");
  };
  bg.querySelector("#delRoom").onclick=async()=>{
    if(confirm("Remove this room?")){await del("rooms",r.id);bg.remove();await refresh();toast("Room removed");}
  };
}

function modal(html){
  const bg=document.createElement("div");bg.className="modal-bg";
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.addEventListener("click",e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
  return bg;
}

    <div class="seg">
      <button type="button" data-status="query" class="${status==='query'?'on':''}">Query / पूछताछ</button>
      <button type="button" data-status="final" class="${status==='final'?'on':''}">Final Booking</button>
    </div>
    <label>Family name / परिवार</label><input id="f_family" value="${esc(b.family||'')}" placeholder="जैसे: खान परिवार">
    <label>Function / समारोह</label><input id="f_fn" value="${esc(b.fn||'')}" placeholder="जैसे: निकाह + वलीमा">
    <div class="grid2">
      <div><label>Date / तिथि</label><input id="f_date" type="date" value="${b.date||''}"></div>
      <div><label>Hall / स्थान</label><input id="f_hall" value="${esc(b.hall||'')}" placeholder="मुख्य लॉन"></div>
    </div>
    <label>Side / पक्ष</label>
    <div class="seg">
      <button type="button" data-side="groom" class="${side==='groom'?'on':''}">वर पक्ष</button>
      <button type="button" data-side="bride" class="${side==='bride'?'on':''}">वधू पक्ष</button>
    </div>

    <div id="queryBlock" style="display:${status==='query'?'block':'none'}">
      <div class="sect"><span class="l"></span><span>कोटेशन हेतु पैकेज चुनें</span><span class="r"></span></div>
      <div class="muted" style="margin-bottom:10px;font-size:12px">जो पैकेज ग्राहक को भेजने हैं उन्हें टिक करें। नेगोशिएटेड रेट हो तो दाईं ओर भरें (खाली = मानक रेट)।</div>
      ${pkgCheckRows()}
      <label>Overall negotiated total (optional) / कुल नेगो रेट</label>
      <input id="f_negototal" type="number" inputmode="numeric" value="${b.negoTotal||''}" placeholder="पूरे कोटेशन का एक रेट (वैकल्पिक)">
    </div>

    <div id="finalBlock" style="display:${status==='final'?'block':'none'}">
      <div class="sect"><span class="l"></span><span>फाइनल पैकेज</span><span class="r"></span></div>
      <label>Package / पैकेज</label>
      <select id="f_pkg">
        ${Object.entries(PACKAGES).map(([k,p])=>`<option value="${k}" ${b.pkg===k?'selected':''}>${esc(p.label)}${p.total?' · '+inr(p.total):''}</option>`).join("")}
      </select>
      <label>Final amount (₹) / फाइनल रेट</label><input id="f_total" type="number" inputmode="numeric" value="${b.total||''}" placeholder="जैसे: 145000">
      ${existing?renderPayments(b):''}
    </div>

    <button class="btn btn-gold" id="saveBooking" style="margin-top:18px">${existing?'Save / सेव करें':'Add / जोड़ें'}</button>

    ${existing?`
    <div id="queryActions" style="display:${status==='query'?'block':'none'}">
      <button class="btn btn-jade" id="qQuote" style="margin-top:10px">Query Quote PDF (तुलना)</button>
      <button class="btn" id="toFinal" style="margin-top:10px;background:var(--gold);color:var(--jade)">✓ Convert to Final Booking</button>
    </div>
    <div id="finalActions" style="display:${status==='final'?'block':'none'}">
      <div class="grid2" style="margin-top:10px">
        <button class="btn btn-ghost" id="pdfQuote">Quote PDF</button>
        <button class="btn btn-ghost" id="pdfInvoice">Invoice PDF</button>
      </div>
    </div>
    <button class="btn" id="waShare" style="margin-top:10px;background:#25D366;color:#fff">WhatsApp भेजें</button>
    <button class="btn" id="delBooking" style="margin-top:10px;background:#fff;color:var(--henna);border:1px solid var(--henna)">Delete / हटाएं</button>`:''}
  `);

  // toggles
  function applyStatus(){
    bg.querySelector("#queryBlock").style.display=status==='query'?'block':'none';
    bg.querySelector("#finalBlock").style.display=status==='final'?'block':'none';
    const qa=bg.querySelector("#queryActions"), fa=bg.querySelector("#finalActions");
    if(qa)qa.style.display=status==='query'?'block':'none';
    if(fa)fa.style.display=status==='final'?'block':'none';
  }
  bg.querySelectorAll("[data-status]").forEach(btn=>btn.onclick=()=>{status=btn.dataset.status;bg.querySelectorAll("[data-status]").forEach(x=>x.classList.toggle("on",x===btn));applyStatus();});
  bg.querySelectorAll("[data-side]").forEach(btn=>btn.onclick=()=>{side=btn.dataset.side;bg.querySelectorAll("[data-side]").forEach(x=>x.classList.toggle("on",x===btn));});

  const pkgSel=bg.querySelector("#f_pkg");
  if(pkgSel)pkgSel.onchange=()=>{const p=PACKAGES[pkgSel.value];if(p&&p.total){bg.querySelector("#f_total").value=p.total;}};
  bg.querySelector("[data-close]").onclick=()=>bg.remove();

  function collectQuotePkgs(){
    const out={};
    Object.keys(PACKAGES).filter(k=>k!=="none").forEach(k=>{
      const cb=bg.querySelector("#qp_"+k); if(!cb)return;
      const rate=Number(val("qr_"+k))||0;
      if(cb.checked)out[k]={on:true,rate};
    });
    return out;
  }

  bg.querySelector("#saveBooking").onclick=async()=>{
    const rec={
      id:b.id||uid(),
      status,
      family:val("f_family")||"Unnamed",
      fn:val("f_fn"),date:val("f_date"),hall:val("f_hall"),side,
      payments:b.payments||[],
    };
    if(status==='query'){
      rec.quotePkgs=collectQuotePkgs();
      rec.negoTotal=Number(val("f_negototal"))||0;
      rec.pkg=b.pkg||"none"; rec.total=b.total||0;
    }else{
      rec.pkg=pkgSel?pkgSel.value:(b.pkg||"none");
      rec.total=Number(val("f_total"))||0;
      rec.quotePkgs=b.quotePkgs||{}; rec.negoTotal=b.negoTotal||0;
    }
    await put("bookings",rec);bg.remove();await refresh();toast(status==='query'?"Query सेव हुई":"बुकिंग सेव हुई");
  };

  if(existing){
    const qq=bg.querySelector("#qQuote"); if(qq)qq.onclick=()=>{
      // persist current selections before generating
      b.quotePkgs=collectQuotePkgs(); b.negoTotal=Number(val("f_negototal"))||0;
      genQueryQuote(b);
    };
    const tf=bg.querySelector("#toFinal"); if(tf)tf.onclick=async()=>{
      const picks=collectQuotePkgs();
      const keys=Object.keys(picks);
      // choose package for final: if one selected use it, else ask
      let chosen=keys.length===1?keys[0]:(b.pkg&&b.pkg!=="none"?b.pkg:keys[0]||"star");
      const negoRate=picks[chosen]?picks[chosen].rate:0;
      const rec={...b,status:"final",pkg:chosen,total:negoRate||PACKAGES[chosen].total,quotePkgs:picks,negoTotal:Number(val("f_negototal"))||0};
      await put("bookings",rec);bg.remove();await refresh();
      bookingForm(S.bookings.find(x=>x.id===b.id));
      toast("Final booking बन गई — पैकेज/रेट जाँच लें");
    };
    const pq=bg.querySelector("#pdfQuote"); if(pq)pq.onclick=()=>genDoc(b,"quote");
    const pi=bg.querySelector("#pdfInvoice"); if(pi)pi.onclick=()=>genDoc(b,"invoice");
    bg.querySelector("#waShare").onclick=()=>waShare(b);
    bg.querySelector("#delBooking").onclick=async()=>{
      if(confirm("Delete this booking?")){await del("bookings",b.id);bg.remove();await refresh();toast("हटा दिया");}
    };
    const ap=bg.querySelector("#addPmt"); if(ap)ap.onclick=async()=>{
      const amt=Number(val("p_amt"));if(!amt){toast("राशि भरें");return;}
      b.payments=b.payments||[];b.payments.push({amt,date:val("p_date")||todayStr(),note:val("p_note")});
      await put("bookings",b);bg.remove();await refresh();bookingForm(S.bookings.find(x=>x.id===b.id));toast("भुगतान जोड़ा");
    };
    bg.querySelectorAll("[data-delpmt]").forEach(btn=>btn.onclick=async()=>{
      b.payments.splice(Number(btn.dataset.delpmt),1);await put("bookings",b);bg.remove();await refresh();bookingForm(S.bookings.find(x=>x.id===b.id));
    });
  }
}

function renderPayments(b){
  const lines=(b.payments||[]).map((p,i)=>`<div class="pmt-line"><span>${fmtDate(p.date)} ${p.note?'· '+esc(p.note):''}</span><span style="display:flex;gap:10px"><b>${inr(p.amt)}</b><button class="del" data-delpmt="${i}">✕</button></span></div>`).join("")||`<div class="muted" style="padding:6px 0">No payments yet.</div>`;
  const bal=balance(b);
  return `
    <div class="sect"><span class="l"></span><span>Payments</span><span class="r"></span></div>
    ${lines}
    <div class="row" style="margin-top:8px;font-size:13px"><span class="muted">Balance</span><b style="color:${bal<=0?'var(--jadeLite)':'var(--henna)'}">${inr(bal)}</b></div>
    <div class="grid2" style="margin-top:12px">
      <div><label>Add payment (₹)</label><input id="p_amt" type="number" inputmode="numeric" placeholder="50000"></div>
      <div><label>Date</label><input id="p_date" type="date" value="${todayStr()}"></div>
    </div>
    <label>Note (optional)</label><input id="p_note" placeholder="Advance / UPI / cash">
    <button class="btn btn-jade" id="addPmt" style="margin-top:12px">Add payment</button>`;
}

/* ─────────── WhatsApp share ─────────── */
function waShare(b){
  const pkg=PACKAGES[b.pkg]||PACKAGES.none;
  const bal=balance(b), paidAmt=paid(b);
  const dt=b.date?new Date(b.date+"T00:00").toLocaleDateString("hi-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):"तिथि निर्धारित नहीं";
  const L=[];
  L.push("*आज़ाद गेस्ट हाउस* — बन्थरा, लखनऊ");
  L.push("");
  L.push("बुकिंग विवरण:");
  L.push("• परिवार: "+(b.family||"—"));
  if(b.fn)L.push("• समारोह: "+b.fn);
  L.push("• तिथि: "+dt);
  if(b.hall)L.push("• स्थान: "+b.hall);
  if(b.pkg&&b.pkg!=="none")L.push("• पैकेज: "+pkg.label);
  L.push("• कुल राशि: "+inr(b.total));
  if(paidAmt)L.push("• प्राप्त एडवांस: "+inr(paidAmt));
  L.push("• "+(bal<=0?"स्थिति: पूर्ण भुगतान": "शेष राशि: "+inr(bal)));
  L.push("");
  L.push("आपके शुभ अवसर के लिए धन्यवाद!");
  const text=encodeURIComponent(L.join("\n"));
  window.open("https://wa.me/?text="+text,"_blank");
}

/* ─────────── Query Quote: multi-package comparison (Hindi) ─────────── */
function genQueryQuote(b){
  const picks=b.quotePkgs||{};
  let cols=Object.keys(picks).filter(k=>picks[k]&&picks[k].on&&PACKAGES[k]);
  if(!cols.length)cols=["gold","silver","bronze"].filter(k=>PACKAGES[k]); // default if none picked
  const today=new Date().toLocaleDateString("hi-IN",{day:"numeric",month:"long",year:"numeric"});
  const evDate=b.date?new Date(b.date+'T00:00').toLocaleDateString("hi-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):'तिथि निर्धारित नहीं';
  const sideTxt=b.side==='bride'?'वधू पक्ष':'वर पक्ष';
  const docNo="QT-"+(b.id||"").slice(-5).toUpperCase();

  // build item-by-item rows: each item label, then each package's qty
  function qtyFor(pkgKey,label){
    const it=(PACKAGES[pkgKey].items||[]).find(x=>x.label===label);
    return it?it.qty:"—";
  }
  const itemRows=PKG_ITEMS.map((label,i)=>{
    const tds=cols.map(k=>`<td style="text-align:center">${esc(qtyFor(k,label))}</td>`).join("");
    return `<tr><td style="text-align:center">${i+1}</td><td>${esc(label)}</td>${tds}</tr>`;
  }).join("");

  // price row: negotiated rate if entered, else standard total
  const priceTds=cols.map(k=>{
    const nego=picks[k]&&picks[k].rate;
    const std=PACKAGES[k].total;
    if(nego&&nego!==std){
      return `<td style="text-align:center"><span style="text-decoration:line-through;color:#9a9a9a;font-size:11px">${inr(std)}</span><br><b style="color:#9C3B2E">${inr(nego)}</b></td>`;
    }
    return `<td style="text-align:center"><b>${inr(std)}</b></td>`;
  }).join("");

  const headTds=cols.map(k=>`<th style="text-align:center">${esc(PACKAGES[k].label)}</th>`).join("");
  const overall=b.negoTotal?`<div class="note" style="color:#9C3B2E;font-weight:600;font-style:normal">विशेष नेगोशिएटेड रेट (सम्पूर्ण): ${inr(b.negoTotal)}</div>`:"";

  const html=`<!doctype html><html lang="hi"><head><meta charset="utf-8"><title>${docNo}</title>
  <style>
    @page{size:A4 landscape;margin:12mm;}
    *{font-family:'Nirmala UI','Mangal',system-ui,sans-serif;color:#1A1714;box-sizing:border-box;}
    body{margin:0;padding:20px;}
    .top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #15433A;padding-bottom:10px;}
    .name{font-size:24px;color:#15433A;font-weight:700;}
    .loc{font-size:12px;color:#6E665A;margin-top:2px;}
    .doctype{text-align:right;}
    .doctype .t{font-size:20px;color:#C9A24B;font-weight:700;}
    .doctype .no{font-size:11px;color:#6E665A;margin-top:3px;}
    .meta{display:flex;justify-content:space-between;margin:14px 0;font-size:12.5px;}
    .meta b{color:#15433A;}
    table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px;}
    th{background:#15433A;color:#F6F1E4;text-align:left;padding:7px 9px;font-weight:600;}
    td{padding:6px 9px;border-bottom:1px solid #E8D9A8;}
    tbody tr:nth-child(even){background:#FBF8EF;}
    .pricerow td{background:#F6F1E4;font-size:14px;border-top:2px solid #15433A;}
    .note{margin-top:12px;font-size:11.5px;color:#6E665A;font-style:italic;}
    .terms{margin-top:14px;font-size:11.5px;color:#3a352e;line-height:1.5;}
    .terms ol{margin:5px 0 0;padding-left:18px;}
    .foot{margin-top:20px;font-size:11px;color:#6E665A;border-top:1px solid #E8D9A8;padding-top:8px;text-align:center;}
    @media print{.noprint{display:none;}body{padding:0;}}
    .noprint{position:fixed;top:10px;right:10px;}
    .noprint button{background:#15433A;color:#fff;border:none;padding:9px 15px;border-radius:8px;font-size:13px;cursor:pointer;}
  </style></head><body>
  <div class="noprint"><button onclick="window.print()">PDF / प्रिंट करें</button></div>
  <div class="top">
    <div><div class="name">आज़ाद गेस्ट हाउस</div><div class="loc">बन्थरा, लखनऊ · मो. 9305982188</div></div>
    <div class="doctype"><div class="t">कोटेशन (तुलना)</div><div class="no">${docNo}<br>${today}</div></div>
  </div>
  <div class="meta">
    <div><b>ग्राहक</b> &nbsp; ${esc(b.family||'—')} · ${sideTxt}</div>
    <div><b>समारोह</b> &nbsp; ${esc(b.fn||'—')} · ${evDate}${b.hall?' · '+esc(b.hall):''}</div>
  </div>
  <table>
    <thead><tr><th style="width:5%;text-align:center">क्र.</th><th style="width:25%">विवरण</th>${headTds}</tr></thead>
    <tbody>
      ${itemRows}
      <tr class="pricerow"><td></td><td><b>कुल राशि</b></td>${priceTds}</tr>
    </tbody>
  </table>
  ${overall}
  <div class="note">${esc(PKG_NOTE)} &nbsp;|&nbsp; (सभी पैकेज में डीजल अलग से)</div>
  <div class="terms"><b>नोट / शर्तें:</b>
    <ol>${PKG_TERMS.map(t=>`<li>${esc(t)}</li>`).join("")}</ol>
  </div>
  <div class="foot">आज़ाद गेस्ट हाउस · बन्थरा, लखनऊ · आपके शुभ अवसर के लिए धन्यवाद</div>
  </body></html>`;
  const w=window.open("","_blank");
  if(!w){toast("PDF हेतु pop-ups allow करें");return;}
  w.document.write(html);w.document.close();
}

/* ─────────── Quote / Invoice document (Hindi) ─────────── */
function genDoc(b,type){
  const pkg=PACKAGES[b.pkg]||PACKAGES.none;
  const isInvoice=type==="invoice";
  const docNo=(isInvoice?"INV":"QT")+"-"+(b.id||"").slice(-5).toUpperCase();
  const paidAmt=paid(b), bal=balance(b);
  const today=new Date().toLocaleDateString("hi-IN",{day:"numeric",month:"long",year:"numeric"});
  const evDate=b.date?new Date(b.date+'T00:00').toLocaleDateString("hi-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):'तिथि निर्धारित नहीं';
  const sideTxt=b.side==='bride'?'वधू पक्ष':'वर पक्ष';

  // QUOTE: full itemised list of the selected package (or all items note if custom)
  let itemRows="";
  if(pkg.items&&pkg.items.length){
    itemRows=pkg.items.map((it,i)=>`<tr><td style="text-align:center">${i+1}</td><td>${esc(it.label)}</td><td style="text-align:center">${esc(it.qty)}</td></tr>`).join("");
  }else{
    itemRows=`<tr><td style="text-align:center">1</td><td>${esc(b.fn||'समारोह बुकिंग')}</td><td style="text-align:center">—</td></tr>`;
  }

  const pmtRows=(b.payments||[]).map(p=>`<tr><td>${fmtDate(p.date)}</td><td>${esc(p.note||'भुगतान')}</td><td style="text-align:right">${inr(p.amt)}</td></tr>`).join("");

  // Body differs: quote shows item table + terms; invoice shows package summary + payment
  const quoteBody=`
    <table>
      <thead><tr><th style="text-align:center;width:10%">क्र.</th><th>विवरण</th><th style="text-align:center;width:32%">${esc(pkg.label||'विवरण')} / संख्या</th></tr></thead>
      <tbody>${itemRows}</tbody>
    </table>
    <div class="totbox">
      <div class="grand"><span>कुल राशि</span><span>${inr(b.total)}</span></div>
      <div style="font-size:11px;color:#6E665A;padding:4px 12px">(डीजल सहित नहीं — डीजल अलग से)</div>
    </div>
    <div class="note">${esc(PKG_NOTE)}</div>
    <div class="terms">
      <b>नोट / शर्तें</b>
      <ol>${PKG_TERMS.map(t=>`<li>${esc(t)}</li>`).join("")}</ol>
    </div>
    <div class="valid">यह कोटेशन 15 दिनों के लिए मान्य है। बुकिंग पुष्टि हेतु एडवांस आवश्यक है।</div>`;

  const invoiceBody=`
    <table>

async function download(name,content,type){
  // 1) Try Web Share API with a file — best on installed Android PWA (save to Drive/Files, share to WhatsApp)
  try{
    const file=new File([content],name,{type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:name});
      return true;
    }
  }catch(e){ /* user cancelled or unsupported — fall through */ }
  // 2) Classic anchor download (must be attached to DOM on some Android builds)
  try{
    const blob=new Blob([content],{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=name;a.rel="noopener";
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
    return true;
  }catch(e){ /* fall through */ }
  // 3) Last resort: open content in a new tab so user can copy/save manually
  try{
    const blob=new Blob([content],{type});
    const url=URL.createObjectURL(blob);
    window.open(url,"_blank");
    return true;
  }catch(e){ return false; }
}
async function exportJson(){
  const data={app:"AzadGuestHouse",version:2,exported:new Date().toISOString(),bookings:S.bookings,vendors:S.vendors,tasks:S.tasks,rooms:S.rooms};
  const ok=await download(`azad-backup-${todayStr()}.json`,JSON.stringify(data,null,2),"application/json");
  toast(ok?"बैकअप तैयार — सेव/शेयर करें":"बैकअप नहीं बन सका");
}
async function exportCsv(){
  const rows=[["Family","Function","Date","Hall","Side","Package","Total","Paid","Balance"]];
  S.bookings.forEach(b=>rows.push([b.family,b.fn,b.date,b.hall,b.side,(PACKAGES[b.pkg]||{}).label||"",b.total,paid(b),balance(b)]));
  const csv="\ufeff"+rows.map(r=>r.map(x=>`"${String(x??"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const ok=await download(`azad-ledger-${todayStr()}.csv`,csv,"text/csv;charset=utf-8");
  toast(ok?"CSV तैयार — सेव/शेयर करें":"CSV नहीं बन सका");
}
async function importJson(file){
  const text=await file.text();
  try{
    const d=JSON.parse(text);
    if(!d.bookings&&!d.vendors&&!d.tasks){toast("Not a valid backup");return;}
    if(!confirm("Replace all current data with this backup?"))return;
    for(const s of STORES){await clearStore(s);for(const item of (d[s]||[]))await put(s,item);}
    await refresh();toast("Backup restored");
  }catch(e){toast("Could not read file");}
}

/* ─────────── Event binding ─────────── */
function bindView(){
  document.querySelectorAll("[data-goto]").forEach(el=>el.onclick=()=>{tab=el.dataset.goto;render();});
  document.querySelectorAll("[data-room]").forEach(el=>el.onclick=()=>{
    const r=S.rooms.find(x=>x.id===el.dataset.room);if(r)roomForm(r);
  });
  const ar=document.getElementById("addRoom");if(ar)ar.onclick=newRoomForm;
  const cp=document.getElementById("calPrev");if(cp)cp.onclick=()=>{calMonth--;if(calMonth<0){calMonth=11;calYear--;}render();};
  const cn=document.getElementById("calNext");if(cn)cn.onclick=()=>{calMonth++;if(calMonth>11){calMonth=0;calYear++;}render();};
  document.querySelectorAll("[data-calday]").forEach(el=>el.onclick=()=>{
    const ds=el.dataset.calday;
    const evs=S.bookings.filter(b=>b.date===ds);
    if(evs.length===1){bookingForm(evs[0]);}
    else if(evs.length>1){dayList(ds,evs);}
    else{bookingForm({side:"groom",payments:[],date:ds});} // free auspicious date → start a booking
  });
  document.querySelectorAll("[data-open='booking']").forEach(el=>el.onclick=()=>{
    const b=S.bookings.find(x=>x.id===el.dataset.id);if(b)bookingForm(b);
  });
  document.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=async()=>{
    const t=S.tasks.find(x=>x.id===el.dataset.toggle);t.done=!t.done;await put("tasks",t);await refresh();
  });
  document.querySelectorAll("[data-deltask]").forEach(el=>el.onclick=async()=>{await del("tasks",el.dataset.deltask);await refresh();toast("Task removed");});
  document.querySelectorAll("[data-delvendor]").forEach(el=>el.onclick=async()=>{await del("vendors",el.dataset.delvendor);await refresh();toast("Vendor removed");});
  const ej=document.getElementById("exportJson");if(ej)ej.onclick=exportJson;
  const ec=document.getElementById("exportCsv");if(ec)ec.onclick=exportCsv;
  const ij=document.getElementById("importJson");if(ij)ij.onchange=e=>{if(e.target.files[0])importJson(e.target.files[0]);};
  const w=document.getElementById("wipe");if(w)w.onclick=async()=>{if(confirm("Erase ALL data permanently? Export a backup first."))if(confirm("Are you sure? This cannot be undone.")){for(const s of STORES)await clearStore(s);await refresh();toast("All data erased");}};
}

document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render();});
document.getElementById("fab").onclick=addMenu;
document.getElementById("gearBtn").onclick=()=>{tab="data";render();};

/* ─────────── Boot ─────────── */
(async()=>{await openDB();await refresh();})();
</script>
